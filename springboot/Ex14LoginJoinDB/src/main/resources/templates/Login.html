<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>로그인/회원가입</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #wrapper {
        border: 1px solid black;
        margin: 100px;
        box-sizing: border-box;
        width: 1500px;
        height: 1100px;
        background-color: white;
        border-radius: 50px;
      }
      .logintitle {
        color: black;
        font-size: 100px;
        text-align: center;
      }
      #user {
        /* border: 1px solid black; */
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 50px;
      }
      .usericon {
        /* border: 1px solid black; */
        width: 85px;
        height: 85px;
        margin-left: 50px;
      }
      .username {
        width: 1280px;
        height: 130px;
        margin-right: 30px;
        border-radius: 15px;
        border: 1px solid black;
        font-size: 40px;
        box-sizing: border-box;
        padding-left: 30px;
      }
      #password {
        /* border: 1px solid black; */
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .pwicon {
        /* border: 1px solid black; */
        width: 97px;
        height: 97px;
        margin-left: 40px;
      }
      .userpw {
        width: 1280px;
        height: 130px;
        margin-right: 30px;
        border-radius: 15px;
        border: 1px solid black;
        font-size: 40px;
        box-sizing: border-box;
        padding-left: 30px;
      }
      #btn {
        /* border: 1px solid black; */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 130px;
        margin-top: 120px;
        gap: 40px;
      }
      .loginbtn {
        background-color: blue;
        width: 200px;
        height: 130px;
        border-radius: 25px;
        color: white;
        font-size: 40px;
        cursor: pointer;
        box-shadow: 0 5px 0 #0056b3;
        button:active {
          box-shadow: 0 2px 0 #0056b3;
          top: 3px;
        }
      }
      .registerbtn {
        background-color: rgb(255, 0, 0);
        width: 200px;
        height: 130px;
        border-radius: 25px;
        color: white;
        font-size: 40px;
        cursor: pointer;
        box-shadow: 0 5px 0 rgb(255, 0, 0);
        button:active {
          box-shadow: 0 5px 0 rgb(255, 0, 0);
          top: 6px;
        }
      }
      #status-box {
        display: none;
        width: 1280px;
        height: 130px;
        margin: 0 auto 30px;
        border-radius: 15px;
        font-size: 40px;
        text-align: left;
        line-height: 130px;
        padding-left: 40px;
        box-sizing: border-box;
        background-color: #d4edda;
        color: #155724;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <p class="logintitle">Login</p>
      <div id="status-box">로그인 성공!</div>
      <div id="user">
        <img
          class="usericon"
          src="/src/main/resources/static/user.png"
          alt=""
        />
        <input class="username" type="text" placeholder="Your Name" />
      </div>
      <div id="password">
        <img
          class="pwicon"
          src="/src/main/resources/static/security.png"
          alt=""
        />
        <input class="userpw" type="password" placeholder="Ypur Password" />
      </div>
      <div id="btn">
        <button class="loginbtn" type="button" onclick="submitLogin()">
          로그인
        </button>
        <button
          class="registerbtn"
          type="button"
          onclick="location.href = 'register.html'"
        >
          회원가입
        </button>
      </div>
    </div>
    <script>
      function submitLogin() {
        const id = document.getElementById("username").value;
        const pw = document.getElementById("userpw").value;
        const statusBox = document.getElementById("status-box");

        fetch("/api/login", {
          method: "POST",
          headers: { "Content-type": "application/json" },
          body: JSON.stringify({ username: id, password: pw }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              statusBox.style.display = "block";
            }
          });
      }
    </script>
  </body>
</html>
