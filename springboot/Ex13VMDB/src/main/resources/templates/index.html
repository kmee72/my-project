<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>자판기프로그램</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #container {
        width: 500px;
        height: 320px;
        margin: 50px auto;
        border: 1px solid black;
        text-align: center;
        background-color: #c62828;
      }
      .head {
        /* border: 1px solid black; */
        width: 480px;
        height: 35px;
        margin: 10px 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px 8px 0 0;
        background-color: white;
        font-size: 20px;
        font-style: italic;
      }
      .nev {
        /* border: 1px solid black; */
        display: flex;
        align-items: center;
        width: 480px;
        margin: 10px 10px;
        height: 35px;
      }
      .contents {
        /* border: 1px solid black; */
        width: 480px;
        height: 120px;
        margin: 8px 10px;
        background-color: white;
      }
      .footer {
        /* border: 1px solid black; */
        width: 200px;
        height: 35px;
        margin-left: 290px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px 0 0 08px;
        background-color: white;
        font-weight: 700;
      }
      .tail {
        /* border: 1px solid black; */
        width: 480px;
        height: 35px;
        margin: 10px 10px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .nev1 {
        /* border: 1px solid black; */
        width: 150px;
        height: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 0 8px 8px 0;
        background-color: white;
        color: #f307f3;
        font-weight: 700;
        cursor: pointer;
      }
      .nev2 {
        /* border: 1px solid black; */
        width: 107px;
        height: 35px;
        display: flex;
        margin-left: 50px;
        font-size: 12px;
      }
      .switch {
        display: flex;
        align-items: center;
        gap: 5px 3px;
        color: white;
        font-weight: bold;
        background: #c62828;
        padding: 10px;
      }

      /* 스위치 외곽선 */
      .slider {
        position: relative;
        width: 30px;
        height: 20px;
        border: 2px solid white;
        border-radius: 20px;
        cursor: pointer;
      }

      /* 내부 흰색 원 */
      .slider::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        background: white;
        border-radius: 50%;
        transition: 0.3s;
      }
      /* 체크 시 이동 (실제 체크박스는 숨김) */
      input {
        display: none;
      }
      input:checked + .slider::before {
        transform: translateX(10px);
      }
      .nev3 {
        border: 1px solid black;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 600;
      }
      tr {
        height: 45px;
      }
      tr td {
        border: 1px solid black;
        padding: 10px;
      }
      tr th {
        border: 1px solid black;
        padding: 5px 18px;
        font-size: 15px;
      }
      .updatebtn {
        width: 50px;
        height: 30px;
        background-color: blue;
        color: white;
      }
      .deletebtn {
        width: 50px;
        height: 30px;
        background-color: rgb(209, 15, 15);
        color: white;
      }
      .addproductbtn {
        width: 110px;
        height: 35px;
        background-color: rgb(238, 9, 9);
        color: white;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="head">
        <h3>자판기 프로그램</h3>
      </div>

      <div class="nev">
        <div class="nev1" onclick="toggleMenu">
          <span id="arrow">▼</span>&nbsp;
          <p>자판기 상품 목록</p>
        </div>
        <div class="nev2">
          <label class="switch">
            한글 <input type="checkbox" /> <span class="slider"></span> ENG
          </label>
        </div>
      </div>

      <div class="contents">
        <div class="countproduct">
          <p>상품 목록이 비어있습니다.</p>
        </div>
        <table>
          <tr>
            <th>번호</th>
            <th>상품명</th>
            <th>가격</th>
            <th>유통기한</th>
            <th>수정</th>
            <th>삭제</th>
          </tr>
          <tr>
            <td>1.</td>
            <td>불고기버거</td>
            <td>1000</td>
            <td>2023-12-20</td>
            <td><button class="updatebtn">수정</button></td>
            <td><button class="deletebtn">삭제</button></td>
          </tr>
        </table>
      </div>
      <div class="footer">
        <p>총 1개의 상품이 있습니다.</p>
      </div>
      <div class="tail">
        <button class="addproductbtn">상품추가하기!</button>
      </div>
    </div>
  </body>
</html>
