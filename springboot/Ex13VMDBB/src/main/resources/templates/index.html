<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자판기 프로그램</title>
    <style>
        body { background-color: #333; display: flex; justify-content: center; padding-top: 50px; font-family: 'Malgun Gothic'; }
        .container { width: 550px; background-color: #b71c1c; padding: 20px; border: 2px solid white; color: white; border-radius: 10px; }
        .header { background-color: white; color: #b71c1c; text-align: center; font-size: 24px; font-weight: bold; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .menu-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-list { background-color: white; color: #b71c1c; border: none; padding: 5px 15px; font-weight: bold; border-radius: 5px; }

        /* 토글 스위치 디자인 */
        .switch { position: relative; display: inline-block; width: 45px; height: 22px; vertical-align: middle; margin: 0 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: white; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #b71c1c; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(23px); background-color: white; }

        table { width: 100%; background-color: white; color: black; border-collapse: collapse; text-align: center; }
        th, td { border: 1px solid #b71c1c; padding: 10px; }
        th { color: #b71c1c; font-weight: bold; }
        .btn-edit { background-color: #2196f3; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .btn-del { background-color: #f44336; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .add-btn-wrapper { text-align: center; margin-top: 25px; }
        .btn-add { background-color: #ef5350; color: white; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }
        .footer-info { text-align: right; margin-top: 15px; }
        .footer-info span { background-color: white; color: #b71c1c; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">★자판기 프로그램★</div>
    <div class="menu-bar">
        <button class="btn-list">▽ 자판기 상품 목록</button>
        <div class="lang-toggle">
            한글
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
            ENG
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>번호</th><th>상품명</th><th>가격</th><th>유통기한</th><th>수정</th><th>삭제</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(list)}">
            <td colspan="6" style="padding: 20px; font-weight: bold; color: #b71c1c;">상품 목록이 비어있습니다.</td>
        </tr>
        <tr th:each="prod : ${list}">
            <td th:text="${prod.productNo}">1</td>
            <td th:text="${prod.productName}">상품명</td>
            <td th:text="${prod.productPrice}">0</td>
            <td th:text="${prod.productLimitDate}">2026-03-05</td>
            <td><button class="btn-edit" th:onclick="|location.href='/editProduct/' + ${prod.productNo}|">수정</button></td>
            <td><button class="btn-del" th:onclick="deleteConfirm([[${prod.productNo}]])">삭제</button></td>
        </tr>
        </tbody>
    </table>

    <div class="footer-info">
        <span>▲ 총 [[${count}]]개의 상품이 있습니다.</span>
    </div>

    <div class="add-btn-wrapper">
        <button class="btn-add" onclick="location.href='/addProduct'">상품 추가하기!</button>
    </div>
</div>

<script th:inline="javascript">
    function deleteConfirm(id) {
        if(confirm("정말로 삭제하시겠습니까?")) {
            location.href = "/deleteProduct/" + id;
        }
    }
</script>
</body>
</html>
