<!-- HTML 주석문(설명문), 실제 출력결과에는 영향 없고 설명만 -->
<!--DOCTYPE: html문서임을 웹브라우저에게 알려줌-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <!--html문서의 정보를 담는 태그  -->
    <title>연습문제4 - 윤동주 서시 웹페이지</title>
  </head>
  <!--실제 내용(콘텐츠)을 담는 태그  -->
  <!--라이브서버에서 실시간 렌더링됨. -->
  <body>
    <!-- SHIFT + END 키(한줄선택) 그다음 delete 누르면 지워짐 -->
    <!-- Home 키(줄 앞으로) -->
    <!-- src속성: 이미지 경로(이미지출력, 이미지 파일 이름만쓰면 끌어옴), alt: 대체문구(이미지 못보여줄때, 준비안됬을때, 써도되고 안써도되고) -->
    <!-- width나 height중 한 가지만 사용 -->
    <img src="logo.png" width="700" alt="커피타임이미지 사용예정" /><br />
    <!-- img속성 한칸 한줄 속성임 그래서 이미지 다음 텍스트 쓰려면 줄바꿈 태그사용 -->
    <!-- h속성은 줄바꿈 속성이 있음 -->
    <!-- 앞 뒤에 아무런 태그도 없는것은 그냥 text임 -->
    <!-- 텍스트 앞에 태그 붙이면 그 태그의 속성 갖게됨 -->
    <!-- 복사하기 : CTRL +C -->
    <!-- 붙여넣기 : CTRL +V -->
    <!-- 오려내기 : CTRL +X -->
    <!-- 텍스트 선택 (한칸씩 이동하면서 선택시): SHIFT + 화살표 오른쪽키-->
    <!-- 텍스트 선택(줄 끝가지 선택시) : SHIFT + END키-->
    <!--현재줄 끝으로 이동 : END키 -->
    <!--현재줄 맨앞으로 이동 : HOME키 -->
    <!-- 드래그프리: 네이버에서 바로 긁을수 있는 플러그인 -->
    <!-- 글자색 바꾸기: font속성중 color속성 사용 -->
    <!-- 컬러속성: https://webstyledesign.tistory.com/entry/Html-%EC%83%89color-%EA%B3%BC-HTML-%EC%83%89%EC%83%81%ED%91%9C-%EB%AA%A8%EC%9D%8C -->
    <h1><font color="teal">서시 - 윤동주</font></h1>
    <br />
    <font color="purple">죽는 날까지 하늘을 우러러<br /></font>
    <font color="purple">한점 부끄럼이 없기를,<br /></font>
    <br />
    <font color="purple">잎새에 이는 바람에도<br /></font>
    <font color="purple">나는 괴로워했다.<br /></font>
    <br />
    <font color="purple">별을 노래하는 마음으로<br /></font>
    <font color="purple">모든 죽어가는 것을 사랑해야지<br /></font>
    <br />
    <font color="purple">그리고 나한테 주어진 길을<br /></font>
    <font color="purple">걸어가야겠다.<br /></font>
    <br />
    <font color="purple">오늘 밤에도 별이 바람에 스치운다.</font>
  </body>
</html>
