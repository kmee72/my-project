<!DOCTYPE html>
<html lang="en">
  <head>
    <title>바로가기태그(하이퍼링크) - a</title>
    <!-- Anchor의 약자 a -->
  </head>
  <body>
    <!-- 연습문제1 -->
    <!-- 1. 구글에 연결되는 a태그를 만드시오 -->

    <!-- 실험결과를 스샷으로 자유게시판에 올려주세요. -->

  </body>
</html>
