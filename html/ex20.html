<!DOCTYPE html>
<html lang="en">
  <head>
    <title>이미지 버튼 - image button</title>
    <!-- 이미지 사이트 :  픽사베이, Flaticon -->
  </head>
  <body>
    <form action="">
      <!-- button태그(HTML v4.0부터 생김) vs input type : button -->
      <button>버튼</button>
      <button><img src="play.png" width="30" alt="버튼클릭" /></button>
      <input type="image" src="play.png"></input>
    </form>
  </body>
</html>
