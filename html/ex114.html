<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>설문조사</h3>
    <fieldset>
      <legend>성별과 나이를 입력하세요.</legend>
      <label>성별:</label>
      <input type="radio" name="gender" id="male" /><label for="male"
        >남성</label
      >
      <input type="radio" name="gender" id="female" /><label for="female"
        >여성</label
      >
      <br />
      <label for="age">나이:</label>
      <input type="text" id="age" />
    </fieldset>
    <br /><br />
    <fieldset>
      <legend>관심 분야를 선택하세요.(1개 이상)</legend>
      <input type="checkbox" id="digital" /><label for="digital"
        >디지털 콘텐츠</label
      >
      <input type="checkbox" id="web" /><label for="web">웹프로그래밍</label>
      <input type="checkbox" id="data" /><label for="data">데이터베이스</label>
      <input type="checkbox" id="pub" /><label for="pub">전자출판</label>
    </fieldset>
    <br /><br />
    <fieldset>
      <legend>다음 문항에 대해 5점 척도로 답하세요.</legend>
      <label>본 세미나의 주제는 만족스러운가? </label>1<input
        type="range"
        value="1"
        step="1"
        min="1"
        max="5"
      />5<br />
      <label>본 세미나의 초청강사는 만족스러운가? </label>1<input
        type="range"
        value="1"
        step="1"
        min="1"
        max="5"
      />5 <br />
      <label>본 세미나의 강의 시간은 적당한가? </label>1<input
        type="range"
        value="1"
        step="1"
        min="1"
        max="5"
      />5
    </fieldset>
    <br /><br />
    기타 의견 사항<br />
    <textarea cols="30" rows="10" placeholder="의견을 적으세요"></textarea>
    <br /><br />
    <button>확인</button> <button>취소</button>
  </body>
</html>
