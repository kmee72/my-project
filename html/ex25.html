<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ex25.html -->
    <title>공간분할태그 - span, div</title>
    <!-- 줄바꿈이 있는 태그(한 줄을 차지한다는 의미) - block 속성-->
    <!-- 예를들어 h1~h6, P, hr, table, ol, ul, form, div 태그들-->
    <!-- 줄바꿈이 없는 태그 - inline 속성-->
    <!-- 예를들어 a태그, input, label, text속성들(b,i,small...), img, select, span -->
  </head>
  <body>
    <a href="">a태그</a>
    <h3>h3태그</h3>
    <h3>h3태그</h3>
    <a href="">a태그</a>
    <i>이탤릭체</i>
    <input type="text" />
  </body>
</html>
