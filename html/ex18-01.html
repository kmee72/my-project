<!DOCTYPE html>
<html lang="en">
  <head>
    <title>address</title>
  </head>
  <body>
    <form action="">
      <label for="address">주소</label>
      <input type="text" id="address" placeholder="아래항목외 기입" /><br />
      <input type="radio" id="radio1" name="address" />
      <label for="radio1">서울</label>
      <input type="radio" id="radio2" name="address" />
      <label for="radio2">부산</label>
      <input type="radio" id="radio3" name="address" />
      <label for="radio3">인천</label>
      <input type="radio" id="radio4" name="address" />
      <label for="radio4">광주</label>
      <input type="radio" id="radio5" name="address" />
      <label for="radio5">제주</label>
      <br />
      <br />
      <label for="본명">이름</label>
      <input type="text" id="본명" placeholder="본명" /><br />
      <br />
      <label for="현재소속">소속</label>
      <input type="text" id="현재소속" placeholder="현재소속" /><br />
      <br />
      <label for="현재직위">직위</label>
      <input type="text" id="현재직위" placeholder="현재직위" />
      <select name="직위">
        <option value="1">대표</option>
        <option value="2">사장</option>
        <option value="3">부장</option>
        <option value="4">과장</option>
        <option value="5">대리</option>
        <option value="6">사원</option>
      </select>
      <br />
      <br />
      <label for="핸드폰번호">전화번호</label>
      <input type="text" id="핸드폰번호" placeholder="핸드폰번호" /><br />
      <br />
      <input type="submit" value="로그인" />
      <button><img src="play.png" width="15" alt="" /></button><br />
      <button type="submit"></button>
      <input type="button" value="버튼" onclick="alert('버튼클릭!');" />
      <input type="image" src="play.png" width="15" />
    </form>
  </body>
</html>
