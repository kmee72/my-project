<!DOCTYPE html>
<html lang="en">
  <head>
    <title>입력태그 : form 태그</title>
    <!-- 로그인, 회원가입 페이지에 주로 사용 -->
    <!-- 프론트엔드(웹르라우저)에서 서버(백엔드)로 정보 전송 두가지 방법 -->
    <!-- 1. form 태그 (현재 우리는 1번 방법 사용할 예정)-->
    <!-- 2. 자바스크립트로 -->
  </head>
  <body>
    <!-- action속성: 서버주소를 넣는다. -->
    <form action="http://www.naver.com"></form>
    <!-- localhost:내PC주소(URL)를 의미하는 예약어 -->
    <!-- 8080: port(포트)이름 -->
    <!-- localhost와 8080구분은 :사용 -->
    <!-- 통신을 위해서는 PC의 주소(localhost)와 PC안에서 돌아가는 여러프로그램중 프로그램(포트들 숫자로 표시) 선택시 -->
    <!-- 하나의 포트가 사용되고 있으면 그 사용되는것은 다른 프로그램이 사용하지 못함 -->
    <!-- method :  통신방식 두가지-> get 또는 post, 기본은 get-->
    <form action="localhost:8080" method="get"></form>
    <!-- input태그 :  사용자의 입력을 받는 태그-->
    <!-- type속성 : text 형식의 입력받음 -->
    <!-- 한글 영문, 숫자, 특수문자 모두 입력가능 -->
    아이디 : <input type="text" /><br />
    비밀번호 : <input type="password" /><br />
    파일업로드 : <input type="file" /><br />
    제출하기 : <input type="submit" />
  </body>
</html>
