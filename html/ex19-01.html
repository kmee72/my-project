<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <input type="checkbox" id="check1" />
      <label for="">수박</label><br />
      <input type="checkbox" id="check2" checked />
      <label for="">사과</label><br />
      <input type="checkbox" id="check3" />
      <label for="">참외</label><br />
      <!-- id 속성 : html문서안에서의 유일한 구분자 -->
      <!-- name 속성 : 서버와 연결되는 입력 이름 -->
      <input type="radio" id="radio0" name="address" />
      <label for="">선택안함</label><br />
      <input type="radio" id="radio1" name="address" />
      <label for="">경기도</label><br />
      <input type="radio" id="radio2" name="address" />
      <label for="">서울</label><br />
      <input type="radio" id="radio3" name="address" checked />
      <label for="">강원도</label><br />
    </form>
  </body>
</html>
