<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ex24.html -->
    <title>연습문제6 - 회원가입 화면을 구성하시오.</title>
  </head>
  <body>
    <form action="">
      <h3>회원가입 폼</h3>
      <label for="name">이름 :</label>
      <input type="text" id="name" placeholder="이름을 입력하세요" /><br />

      <label for="password">비밀번호 :</label>
      <input
        type="password"
        id="password"
        placeholder="비번을 입력하세요"
      /><br />
      <label for="mobile">핸드폰 :</label>
      <input type="text" id="mobile" placeholder="핸드폰을 입력하세요" /><br />

      <label for="email">이메일 :</label>
      <input type="email" id="email" placeholder="이메일을 입력하세요" /><br />

      <label>성별</label>
      <input type="radio" name="gender" id="male" /><label for="male"
        >남성</label
      >
      <input type="radio" name="gender" id="female" /><label for="female"
        >여성</label
      ><br />

      <label>취미</label>
      <input type="checkbox" id="walk" /><label for="walk">걷기</label>
      <input type="checkbox" id="run" /><label for="run">달리기</label>
      <input type="checkbox" id="cycle" /><label for="cycle">자전거타기</label
      ><br />
      <label>사는곳: </label>
      <select>
        <option>서울</option>
        <option>경기</option>
        <option>인천</option></select
      ><br />
      <button>회원가입</button>
    </form>
  </body>
</html>
