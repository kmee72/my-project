<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        border: 1px solid red;
        width: 400px;
        margin: 10px auto;
      }
      h1,
      h3 {
        background-color: aqua;
        text-align: center;
      }
      h2 {
        background-color: pink;
        text-align: left;
      }
      h4 {
        background-color: blanchedalmond;
        text-align: right;
      }
      .red {
        color: red;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>
        동해물<span class="red">고</span> 백두<span class="red">신</span>이
      </h1>
      <h2>마르고 닳도록</h2>
      <h3>하느님이 보우하사</h3>
      <h4>우리나라 만세~</h4>
    </div>
  </body>
</html>
