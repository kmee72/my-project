<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Document</title>

        margin: 10px;

        width: 50px;

      }
      .top {
        vertical-align: top;
      }
      .middle {

      }
      .bottom {
        vertical-align: bottom;
      }
    </style>
  </head>

    <div class="box">
      일반텍스트<img src="http://placehold.co/50X50" class="middle" />middle
    </div>
    <div class="box">
      일반텍스트<img src="http://placehold.co/50X50" class="bottom" />bottom
    </div>
    <div class="box">
      일반텍스트<img src="http://placehold.co/50X50" class="text-bottom" />
