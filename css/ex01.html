<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- UTF-8:문자 인코딩 형식 -  유니코드(전세계표준) -->
    <meta charset="UTF-8" />
    <!-- 모바일 해상도 설정 : 거의 바꾸지 않음 device전체 넓이 다 사용한다는 의미(width=device-width), -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> CSS기초 <!--HTML(Hyper Text Markup Language) : 웹문서의 골격과 데이터를
      제공함. --> <!-- CSS : 디자인과 레이아웃(배치)를 제공함.--> <!-- Cascading
      Style Sheet의 약자 --> <!-- Cascading : 중첩된다. 위에서 아래로
      흐른다(계골물 연상) --> <!-- 마치 유화를 그릴때, 덧칠을 하면 기존의 색이
      덮어지는것과 비슷한 속성 --> <!-- CSS의 속성이 겹쳐질 때, 나중 속성이 기존
      속성을 지운다. -->
    </title>
    <style>
      h1 {
        color: red;
      }
      h1 {
        color: blue;
      }
    </style>
  </head>
  <body>
    <h1>H1 제목 테그입니다.</h1>
  </body>
</html>
