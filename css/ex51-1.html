<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/reset.css">
    <style>
      /* 에릭마이어의 CSS 리셋 코드(가장 인기있는) */
      /* https://meyerweb.com/eric/tools/css/reset/ */
      /* 초기화 코드 */
      * {
        /* body 기본마진 8px */
        margin: 0;
        padding: 0;
      }
      a {
        /* a태그 밑줄 제거 */
        text-decoration: none;
      }
      li {
        /* 점 점 점 123제거 */
        list-style: none;
      }
      #wrapper{
        /* 웹브라우저 화면 중앙으로 전체 콘텐츠를 정렬 */
        margin: 0 auto;
        /* 고정너비 */
        width: 1000px;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <header></header>
      <nav></nav>
      <main>
        <aside></aside>
        <section></section>
      </main>
      <footer></footer>
    </div>
  </body>
</html>
