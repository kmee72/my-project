<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: antiquewhite;
      }
      #wrapper {
        /* 내용물을 안쪽으로 이동 */
        padding: 0 20px;
      }
      H1 {
        margin: 20px 0;
        text-align: center;
        color: brown;
      }
      hr {
        height: 1px;
        background-color: black;
      }
      p {
        margin-top: 20px;
        color: blueviolet;
      }
    </style>
  </head>
  <body>
    <!-- 최상위 래퍼 클래스 -->
    <div id="wrapper">
      <h1>소연제</h1>
      <hr />
      <p>
        저는 체조 선수 소연재입니다. 음악을 들으면서 책읽기를 좋아합니다. 김치
        찌개와 막국수 무척 좋아합니다
      </p>
    </div>
  </body>
</html>
