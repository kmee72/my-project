<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex40.html -->
    <title>img태그- object-fit 속성</title>
    <!-- img태그에서 이미지를 배치하는 속성 -->
    <style>
      .box {
        width: 500px;
        height: 500px;
        border: 1px solid red;
      }
      .img1 {
        /* 기본값. 콘텐츠(이미지)가 컨테이너(img태그)를 채운다 */
        /* 단점 :  이미지의 왜곡(일그러짐) */
        object-fit: fill;
      }
      .img2 {
        /* none : 원래 이미지 크기를 유지한다. 원래 이미지가 크기떄문에 이미지의 일부만 보일수 있음 */
        /* 콘텐츠 초과시 이미지의 가운데만 보일수 있음 */
        object-fit: none;
      }
      .img3 {
        /* 이미지의 W, H중에 더 큰쪽을 컨테이너에 밎춘다. */
        /* ekswja : 여백이 생긴다. */
        object-fit: contain;
      }
      .img4 {
        /* 이미지의 W,H중에 더 작은쪽을 컨테이너에 맞춘다 */
        /* 단점 : 이미지가 잘려나감 */
        object-fit: cover;
      }
      .img5 {
        /* 콘텐츠의 크기가 none과 contain중 더 작은 크기가 맞춰지도록 설정 */
        /* 1.  컨데이너보다 콘텐츠가 작으면 none(원래크기) */
        /* 22.              콘탠츠가 더 크면 contain */
        object-fit: scale-down;
      }
    </style>
  </head>
  <body>
    <!-- <div><img class="box img1 src="bg.png"></div> -->
    <!-- (div>img.box.img$[src=bg.png])*5 -->
    <div><img src="bg.png" alt="" class="box img1" /></div>
    <div><img src="bg.png" alt="" class="box img2" /></div>
    <div><img src="bg.png" alt="" class="box img3" /></div>
    <div><img src="bg.png" alt="" class="box img4" /></div>
    <div><img src="rabbit.png" alt="" class="box img5" /></div>
  </body>
</html>
