<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul {
        display: table;
        width: 90%;
        text-align: center;
        border-spacing: 20px;
      }
      ul li {
        display: table-cell;
        border: 1px solid #ddd;
        height: 150px;
        vertical-align: middle;
        list-style-type: none;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>항목 1</li>
      <li>항목 2</li>
      <li>항목 3</li>
      <li>항목 4</li>
    </ul>
  </body>
</html>
