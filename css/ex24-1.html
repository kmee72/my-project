<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body * {
        border: 1px solid red;
      }
      #div1 {
        display: none;
      }
      #span2 {
        width: 200px;
        height: 200;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="div1">DIV는 Block속성이다.</div>
    <span id="span1">SPAN은 Inline속성이다.</span>
    <span id="span2">SPAN은 Inline속성이다.</span>
    <span>SPAN은 Inline속성이다.</span>
  </body>
</html>
