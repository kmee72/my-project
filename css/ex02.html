<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex02.html -->
    <title>CSS 적용하는 방법 3가지</title>
    <!-- 방법1 : head태그 안에 style태그 안에 (기본적으로 사용) -->
    <!-- 방법2 : inline style, 태그 안에 style속성으로 집어넣는 방법 (인스턴트,임식적으로 선택자 없을때 간단히 사용) -->
    <!-- 방법3 : 확장자 .css파일로 만들어서 추가(임포트) (대용량일때 사용)-->
    <style>
      /* css안의 주석문 형태임 */
      /* h1 : h1태그를 선택했다는 의미 */
      /* { } : css속성을 넣을 때 사용하는 블럭(즉 영역), 여러개 속성을 지정해야 할 때  */
      /* color : css속성(글자색-전경색) */
      /* :(콜론) : 속성과 값의 구분자 */
      /* ;(세미콜론) : css 속성 1개의 마침표 */
      H1 {
        color: red;
      }
    </style>
    <!-- link태그 : 외부파일(css,js)을 임포트할 때 사용 -->
    <!-- rel속성 : 외부파일 형식 -->
    <!-- href속성 : 외부파일 이름 -->
    <link rel="stylesheet" href="mycss.css" />
  </head>
  <body>
    <h1>제목태그 H1입니다.</h1>
    <h2 style="color: blue">제목태그 H2입니다.</h2>
    <h3>제목태그 H3입니다.</h3>
  </body>
</html>
