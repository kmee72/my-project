<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연습문제 - 반응형웹과 flex 연동</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 20px;
        font-weight: bold;
      }
      #wrapper {
        display: flex;
        flex-flow: row wrap;
      }
      #wrapper div {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #header {
        background-color: lightgreen;
        height: 80px;
        flex: 1 100%;
      }
      #section1 {
        background-color: rgb(238, 113, 82);
        height: 100px;
        flex: 1 50%;
      }
      #section2 {
        background-color: rgb(228, 200, 193);
        height: 100px;
        flex: 1 50%;
      }
      #section3 {
        background-color: rgb(21, 199, 223);
        height: 100px;
        flex: 1 50%;
      }
      #section4 {
        background-color: rgb(191, 222, 226);
        height: 100px;
        flex: 1 50%;
      }
      #ad {
        background-color: rgb(163, 105, 160);
        height: 80px;
        flex: 1 50%;
      }
      #inform {
        background-color: rgb(7, 80, 90);
        height: 80px;
        flex: 1 50%;
      }
      #footer {
        background-color: rgb(128, 197, 206);
        height: 80px;
        flex: 1 100%;
      }
      @media screen and (min-width: 780px) and (max-width: 959px) {
        #header {
          flex: 1 80%;
          order: 0;
        }
        #section1 {
          flex: 1 100%;
          order: 2;
        }
        #section2 {
          flex: 1 100%;
          order: 2;
        }
        #section3 {
          flex: 1 100%;
          order: 2;
        }
        #section4 {
          flex: 1 100%;
          order: 2;
        }
        #ad {
          flex: 1 20%;
          order: 1;
        }
        #inform {
          flex: 1 30%;
          order: 2;
        }
        #footer {
          flex: 1 70%;
          order: 2;
        }
      }
      @media screen and (max-width: 767px) {
        #header {
          flex: 1 100%;
        }
        #section1 {
          flex: 1 50%;
        }
        #section2 {
          flex: 1 50%;
        }
        #section3 {
          flex: 1 50%;
        }
        #section4 {
          flex: 1 50%;
        }
        #ad {
          flex: 1 30%;
        }
        #inform {
          flex: 1 70%;
        }
        #footer {
          flex: 1 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="header">헤더</div>
      <div id="section1">섹션1</div>
      <div id="section2">섹션2</div>
      <div id="section3">섹션3</div>
      <div id="section4">섹션4</div>
      <div id="ad">광고</div>
      <div id="inform">정보</div>
      <div id="footer">푸터</div>
    </div>
  </body>
</html>
