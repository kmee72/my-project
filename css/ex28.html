<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex28.html -->
    <title>글자요소 정렬: text-align, vertical-align</title>
    <!-- text-align : 가로방향 left center right -->
    <!-- vertical-align : 세로방향 top middle bottom -->
    <!-- display : inline, inline-block에서만 동작함 -->
    <style>
      * {
        border: 1px solid red;
      }
      h3 {
        border: 1px solid blue;
      }
      #box1 {
        height: 100px;
      }
      /* 대부분 실무에서는 flex box를 이용하여 배치(지금은 수동으로 지정) */
      h3 {
        margin-top: 35px;
        /* h1 태그 요소는  block타입니다. */
        /* h1안에 있는 inline콘텐츠를 가운데 정렬하라 */
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="box1">
      <h3>가운데로 보내주세요~</h3>
    </div>
  </body>
</html>
