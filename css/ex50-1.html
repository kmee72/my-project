<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #wrapper {
        margin: 0 auto;
        width: 1000px;
      }
      .box {
        border: 1px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      header {
        height: 100px;
      }
      nav {
        height: 40px;
      }
      main {
        display: flex;
      }
      aside {
        height: 402px;
        width: 30%;
        text-align: center;
        margin-top: 0;
        background-color: aqua;
      }
      h3 {
        margin-top: 10px;
      }
      section {
        height: 401px;
        width: 70%;
      }
      footer {
        height: 50px;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <header class="box"></header>
      <nav class="box"></nav>
      <main>
        <aside class="container">
          <h3>asd</h3>
          <img src="/dog.jpg" width="200px" height="120px" />
          <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
          </ul>
        </aside>
        <section class="box"></section>
      </main>
      <footer class="box"></footer>
    </div>
  </body>
</html>
