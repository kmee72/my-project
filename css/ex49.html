<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex49.html -->
    <title>flex로 시캔틱 태그 기반 웹 만들기</title>
    <!-- 최상위 래퍼 태그 사용하기 -->
    <style>
      #wrapper {
        margin: 0 auto;
        width: 1000px;
        height: auto;
        border: 1px solid black;
        text-align: center;
      }
      header {
        height: 80px;
        border: 1px solid black;
        background-color: purple;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      nav {
        height: 50px;
        border: 1px solid black;
        background-color: green;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      main {
        height: 600px;
        border: 1px solid black;
        display: flex;
      }
      section {
        width: 65%;
        border: 1px solid;
        background-color: darkslategrey;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      aside {
        width: 35%;
        border: 1px solid;
        background-color: orange;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      footer {
        height: 50px;
        border: 1px solid;
        background-color: green;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      h2 {
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <header>
        <h1 style="color: white">header</h1>
      </header>
      <nav><h3 style="color: white" >nav</h3></nav>
      <main>
        <section><h2 style="color: white">section</h2></section>
        <aside><h2 style="color: white">ascide</h2></aside>
      </main>
      <footer><h2 style="color: white">footer</h2></footer>
    </div>
  </body>
</html>
