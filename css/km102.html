<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #container {
        border: 1px solid rgb(228, 9, 162);
        padding-left: 10px;
        margin: 10px auto;
        width: 500px;
      }
      .red {
        color: red;
      }
      .blue {
        color: blue;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1 class="red">레드향</h1>
      <p>껍질에 묽은 빛이 들어 <span class="red">레드향</span> 이라 불린다.</p>
      <p>
        래드향은 한라봉과 귤을 교배한 것으로 일반 귤보다 2~3배 크고, 과육이 붉고
        통통하다.
      </p>
      <p>
        <span class="blue">비타민C</span>와 <span class="blue">비타민P</span>가
        풍부해 혈액순환, 감기예방 등에 좋은 것으로 알려져 있다.
      </p>
    </div>
  </body>
</html>
