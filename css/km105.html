<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        border: 1px solid black;
        width: 800px;
        height: 180px;
        margin-left: 10px;
        padding: 0 30px;
      }
      div h1 {
        margin-top: 10px;
      }
      .accent {
        color: white;
        width: 185px;
      }
      .bg {
        background-color: purple;
      }
      #red {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div><h1 class="accent bg">탐라국 입춘굿</h1></div>
      제주도의 문화축제 중에서 유일하게
      <span id="red">탐라 시대부터 내려온 축제 </span>이다. <br />
      <br />
      제주에서 입춘은 새철(제주어,샛절) 드는 날이란 한다. <br />
      하늘의 1만 8,000 신이 지상으로 내려와 새해 일들을 시작하는 때다.
    </div>
  </body>
</html>
