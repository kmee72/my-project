<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex26.html -->
    <title>테두리선</title>
    <style>
      div {
        width: 100;
        height: 100;
        background-color: aqua;
        /* 한줄 표현 : 굵기 타입 색상 (순서바꾸면 안됨)*/
        border: 10px solid red;
        border-width: 20px;
        /* solid 실선, dashed 줄선, dotted점선  */
        border-style: dashed;
        border-style: dotted;
        border-color: green;
        /* 모서리를 둥글게 */
        border-style: solid;
        /* LT RT RB LB  시계방향 */
        border-radius: 5px;
        /*           LT,RB  RT,LB */
        border-radius: 20px 50px;
        /*               LT  RT  RB    LB */
        border-radius: 10px 20px 30px 40px;

        border-top-left-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
