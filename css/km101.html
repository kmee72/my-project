        border: 1px solid red;
      }

  <body>
    <h1 class="accent bg">레드향</h1>
    <p>껍질에 묽은 빛이 들어 <span class="accent">레드향 </span>이라 불린다.</p>
    <p>
      래드향은 한라봉과 귤을 교배한 것으로 일반 귤보다 2~3배 크고, 과육이 붉고
      통통하다.
    </p>
    <p>
      비타민C와 비타민P가 풍부해 혈액순환, 감기예방 등에 좋은 것으로 알려져
      있다.
    </p>
  </body>
