<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex36.html -->
    <title>구글 웹폰트 사용하기</title>
    <!-- 사용자의 PC에 폰트를 설치하지 않고도, 폰트 적용 가능 -->
    <!-- https://fonts.google.com/ -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Yeon+Sung&display=swap"
      rel="stylesheet"
    />
    <style>
      /* .nanum-gothic-regular : 웹사이트에서 copy해올때 css 선택자는 필요없기에 지움 */
      h1 {
        /* 글꼴(폰트) 이름 */
        font-family: "Nanum Gothic", sans-serif;
        /* 글꼴 크기 */
        font-size: 24px;
        /* font-weight 글꼴 굵기*/
        font-weight: 800;
        /* font-weight 글꼴 스타일*/
        font-style: normal;
      }
      h2 {
        font-family: "Yeon Sung", system-ui;
        font-weight: 400;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <h1>대한민국 홍길동 12345 !@#</h1>
    <h2>코리아 Afternoon~ 12334 !@#</h2>
  </body>
</html>
