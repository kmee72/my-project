<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex31.html -->
    <title>자기소개 글 페이지 만들기</title>
    <!-- 그림과 같이 페이지 작성후 체절에 올려주세요 -->
    <style>
      body {
        background-color: lightyellow;
      }
      h3 {
        color: red;
        text-align: center;
      }
      hr {
        margin: 0 30px;
      }
      p {
        color: violet;
        height: 60px;
        padding: 0 30px;
      }
    </style>
  </head>
  <body>
    <div>
      <h3>소연제</h3>
    </div>
    <hr />
    <div>
      <p>
        저는 체조 선수 소연재입니다. 음악을 들으면서 책읽기를 좋아합니다. 김치
        찌개와 막국수 무척 좋아합니다.
      </p>
    </div>
    <div></div>
  </body>
</html>
