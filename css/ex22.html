<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex22.html -->
    <title>배경이미지 입히기</title>
    <style>
      body {
        /* 배경이미지 설정 */
        background-image: url("bg.png");
        /* 반복제거 */
        background-repeat: no-repeat;
        /* 배경이미지 크기 설정 2가지 방법 : 1.cover 배경영역을 완전히 덮는다(이미지가 잘릴수 있으나 이미지 해상도는 유지).  */
        /*                                   2.contain 이미지가 전체 다 보이도록 한다.(화면 여백이 생길 수 있다.) */
        background-size: cover;
      }
      body {
        /* 한줄 표현 : 이미지     반복      위치     / 크기 */
        background: url(bg.png) no-repeat top center / contain;
        border: 1px solid red;
      }
    </style>
  </head>
  <body>
    <!-- div>p{문단태그입니다.}*5 -->
    <div>
      <p>문단태그입니다.</p>
      <p>문단태그입니다.</p>
      <p>문단태그입니다.</p>
      <p>문단태그입니다.</p>
      <p>문단태그입니다.</p>
    </div>
  </body>
</html>
