<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex06.html -->
    <title>태그 선택자와 id, class선택자 연결</title>
    <style>
      /* 태그선택자 .(점)클래스 선택자 연결 */
      h1.select {
        background-color: cyan;
      }
      /* 태그선택자 # 아이디선택자 연결 */
      li#item {
        color: blue;
      }
      .item {
        background-color: aqua;
      }
      
    </style>
  </head>
  <body>
    <h1 class="select">제목태그 H1</h1>
    <h1>제목태그 H1</h1>
    <ul>
      <li class="select">아이템1</li>
      <li id="item">아이템2</li>
      <li class="select">아이템3</li>
      <!-- id는 한 개만, class는 여러개 들어 갈 수 있다. -->
      <li class="select item">아이템4</li>
    </ul>
  </body>
</html>
