<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex04.html -->
    <title>id 선택자, class 선택자</title>
    <!-- id : html문서 안에 유일한 태그로 지정(주민번호,학번 등같이 겹치면 안된다는 의미) -->
    <!-- class : 문서 안에 여러개를 묶어서 지정(1학녀, 2학녀..) -->
    <!-- id 앞에 #을 붙임, class앞에 .(점)을 붙임. -->
    <style>
      #header1 {
        color: red;
      }
      /* id header2를 가진 태그의 글자색을 blue로 하시오. */
      #header2 {
        color: blue;
      }
      .tag1 {
        background-color: aqua;
      }
      #header2{
        background-color: 1px ;
      }
    </style>
  </head>

  <body>
    <!-- 아래 코드는 id는 다르게 class는 하나로 묶였음 -->
    <h1 id="header1">제목태그 H1</h1>
    <h1 id="header2">제목태그 H1</h1>
    <p class="tag1">문단태그 p</p>
    <a class="tag1" href="">앵커태그 a</a>
  </body>
</html>
