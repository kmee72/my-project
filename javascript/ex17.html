<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex17.html -->
    <title>논리연산자</title>
    <script>
      // 논리연산자 : AND  OR  NOT
      // AND 연산자 :  ~이고, ~이면서
      //  OR 연산자 : ~이거나, 또는, ~일수도, ~중의 하나이면
      // not 연산자 : ~이 아닌

      // AND 로직표
      // T && T => T (둘다 true일때만 true)
      // T && F => F
      // F && T => F
      // F && F => F

      // OR 로직표
      // T || T => T
      // T || F => T
      // F || T => T
      // F || F => F (둘다 flase 일때만 flase)

      // NOT 로직표
      //  !T => F
      //  !F => T

      // 연습문제
      // 다음 결과를 암산으로 예측하시오.
      console.lot(!(10 > 20) || 10 < 20); //true
      console.log(true || (false && false && true)); //true
    </script>
  </head>
  <body></body>
</html>
