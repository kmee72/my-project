            //문제4
            //let N = 5;  N에 따라서 정사각형의 너비/높이가 정해진다.
            //  5x5짜리 정사각형을 그린다.
            //*****
            //*   *

            //*   *
            //*****
            //1. NxN의 정사각형을 다 찍는다.
            //2. 패턴(일정한 흐름) : i가 증가할수록 감소, j증가할수록 증가.
            //3. 코드로 논리화 한다.반복문, 조건문, 변수

            let str = "";
            let N=7;
            for (let i = 0; i < N; i++) {
              for(let j=0; j<N; j++){
              if(i === 0||i=== N-1||j === 0 || j === N-1){
                str += "*";
                }else { str += " ";}
              }
                str += "\n";
              }
              console.log(str);


            //문제5

            //*****

            //*****
            let str="";
            let N=7;
            for(let i=0; i<N; i++){
              for(let j=0; j<N; j++){
                if(i === 0 || i === N-1 ||i ===N-1-i){
                  str += "*"
                }else if{
                for (let j=0; j<N-1-i; j++){
                  str=" ";
                }
                }
              }
            }
            console.log(str);
    </script>
