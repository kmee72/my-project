<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>연습문제 - 계산기 프로그램</title>
    <style>
      body {
        width: 300px;
        height: 450px;
        margin: 0 auto;
        padding: 0;
        border: 1px solid black;
        text-align: center;
        font-family: Arial, sans-serif;
      }
      #head {
        margin: 8px 0;
        font-size: 13px;
        /* border: 1px solid black; */
      }
      .main {
        margin: 8px 0;
        font-size: 13px;
        border: 1px solid black;
      }
      .num {
        display: flex;
        justify-content: space-between;
        padding: 5px 30px 10px;
        font-size: 13px;
      }
      .btn {
        /* border: 1px solid black; */
      }
      .btn1,
      .btn2 {
        padding: 5px 100px;
        margin-bottom: 5px;
        margin-left: 35px;
        margin-right: 35px;
        background-color: rgb(16, 79, 214);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 13px;
      }
      .btn2 {
        padding-left: 95px;
        padding-right: 95px;
      }
      .btn-clear {
        background-color: red;
      }
    </style>
  </head>
  <body>
    <div id="head">
      <p>JavaScript</p>
      <p>계산기 프로그램을 작성해보자</p>
    </div>

    <div id="main">
      <div class="num">숫자1 <input type="text" id="num1" value="10" /></div>
      <div class="num">숫자2 <input type="text" id="num2" value="3" /></div>
      <div class="num">
        연산 결과
        <input
          type="text"
          id="result"
          value=""
          disabled
          style="background-color: #ccc; border: none"
        />
      </div>
    </div>

    <div class="btn">
      <button class="btn1" onclick="calc('덧셈')">덧셈</button>
      <button class="btn1" onclick="calc('뺄셈')">뺄셈</button>
      <button class="btn1" onclick="calc('곱셈')">곱셈</button>
      <button class="btn2" onclick="calc('나눗셈')">나눗셈</button>
      <button class="btn2" style="background-color: red" onclick="clearAll()">
        <p>지우기</p>
      </button>
    </div>

    <script>
      function calc(op) {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        let result = document.getElementById("result");

        if (op === "덧셈") {
          result.value = num1 + num2;
        } else if (op === "뺄셈") {
          result.value = num1 - num2;
        } else if (op === "곱셈") {
          result.value = num1 * num2;
        } else if (op === "나눗셈") {
          if (num2 !== 0) {
            result.value = num1 / num2;
          } else {
            result.value = "0으로 나눌 수 없음";
          }
        } else if (op === "지우기") {
          result.value = "";
          document.getElementById("num1").value = "";
          document.getElementById("num2").value = "";
        }
      }
    </script>
  </body>
</html>
