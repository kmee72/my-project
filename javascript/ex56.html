<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex56.html -->
    <!-- 클로드(코드) 사용 예제-->
    <!-- AI를 통한 코드 작성시 유의점 -->
    <!-- 1. 나태해진다. ->작성된 코드를 자세히 안본다. -->
    <!-- 2. 내가 알수없는 코드 만들어지면, 손대지 못한다. -->
    <!--       -> 내가 이해가능한 코드로 변경해서 사용한다. -->
    <!--       -> 코멘트를 자세히 달아 달라고 요청한다. -->
    <!--       -> 고급문법(block coding, 정규식..)자제! => 초/중급 개발자 이해가능 -->
    <!-- 3. 중대형 프로젝트 이상의 고도의 작업은 생성하지 못한다. -->
    <title>사칙연산 프로그램 - claude사용</title>
  </head>
  <body>
    <script>
      // 두 숫자 정의
      const num1 = 10;
      const num2 = 5;

      // 사칙연산 수행
      const addition = num1 + num2;
      const subtraction = num1 - num2;
      const multiplication = num1 * num2;
      const division = num1 / num2;

      // 콘솔에 결과 출력
      console.log("=== 사칙연산 결과 ===");
      console.log(`${num1} + ${num2} = ${addition}`);
      console.log(`${num1} - ${num2} = ${subtraction}`);
      console.log(`${num1} × ${num2} = ${multiplication}`);
      console.log(`${num1} ÷ ${num2} = ${division}`);

      // 함수로 만든 버전
      function calculate(a, b, operator) {
        switch (operator) {
          case "+":
            return a + b;
          case "-":
            return a - b;
          case "*":
            return a * b;
          case "/":
            return b !== 0 ? a / b : "0으로 나눌 수 없습니다";
          default:
            return "잘못된 연산자입니다";
        }
      }

      // 함수 사용 예제
      console.log("\n=== 함수 사용 예제 ===");
      console.log(`calculate(15, 3, '+') = ${calculate(15, 3, "+")}`);
      console.log(`calculate(15, 3, '-') = ${calculate(15, 3, "-")}`);
      console.log(`calculate(15, 3, '*') = ${calculate(15, 3, "*")}`);
      console.log(`calculate(15, 3, '/') = ${calculate(15, 3, "/")}`);
    </script>
  </body>
</html>
