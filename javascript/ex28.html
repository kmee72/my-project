      //연습문제
      //랜덤으로 달(Month, 1~12월)을 생성하고,
      //12,1,2이면 "겨울"
      //3,4,5이면 "봄"
      //6,7,8이면 "여름"
      //9,10,11이면 "겨울"

      let month = Math.floor(Math.random() * 12)+1;
      switch (month) {
        case 12:
        case 1:
        case 2:
          console.log("겨울");
          break;
        case 3:
        case 4:
        case 5:
          console.log("봄");
          break;
        case 6:
        case 7:
        case 8:
          console.log("여름");
          break;
        case 9:
        case 10:
        case 11:
          console.log("가을");
          break;
      }
    </script>
