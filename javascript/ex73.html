<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex73.html -->
    <title>Document</title>
    <script>
      // 재귀함수 : 자기가 자기를 호출하는 함수
      // Recursive Function
      // https://velog.io/@cm961115/Memory-%EB%A9%94%EB%AA%A8%EB%A6%AC-%EA%B5%AC%EC%A1%B0-code-data-stack-heap

      let count = 0; //전역변수
      function myFunc() {
        console.log("myFunc 시작:", count);
        count++; //함수에 진입시마다 카운트를(depth를) 증가시킴
        // 탈출조건
        if (count > 2) {
          count--;
          console.log("탈출1:count=" + count);
          return;
        }

        myFunc(); //자신을 다시 호출(stack메모리가 부족하면서 무한루프 걸림)
        count--;
        console.log("탈출2:count=" + count);
        return;
      }
      console.log("메인함수 시작");
      myFunc();
      console.log("메인함수 종료");
    </script>
  </head>
  <body></body>
</html>
