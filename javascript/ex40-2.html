      //문제4 - 숫자야구게임
      //  투수가 무한히 공을 던진다.
      //  스트라이크를 던질 확률은 70%이다. (1~100정수 랜덤->70보다 작다.)
      //  볼을 던질 확률은 30%이다.
      //  누적스트라이크 3개가 될때, 게임을 중단하시오.
      //  총 투구 수를 출력하고, 볼의 갯수도 출력하시오.

      count = 0;
      while (true) {        
        let random = Math.floor(Math.random() * 100) + 1;
        if (random < 70) {
          count++;
        }
        if (count == 3) {
          console.log(`총투구수는",${count++}`);
          break;
        }
      }

      // T
      let 스트라이크 = 0;
      let 볼 = 0;
      let 투구수 = 0;
      while (true) {
        let 확률 = Math.floor(Math.random() * 100) + 1;
        투구수++;
        if (확률 < 70) {
          스트라이크++;
          console.log("스트라이크");
          
        } else {
          볼++;
          console.log("볼");
          
        }
        if (스트라이크 == 3) {
          console.log("게임종료");
          console.log(`총 투구수: ${투구수}, 볼의 수: ${볼}`);

        }
