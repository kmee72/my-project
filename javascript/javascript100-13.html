<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      /* 문제13 : 몫과 나머지
      prompt로 사용자로부터 두 숫자를 입력받습니다.
      두번째 숫자로 첫번째 숫자를 나누었을 때 그 몫과 나머지를 공백으로 구분하여 출력하세요.
      입출력
      입력 :
      10
      2
      출력 : 5 0 */

      const inputNum = prompt("두개의 숫자를 입력하세요.")
        .split(" ")
        .map(Number);
      num1 = inputNum[0] / inputNum[1];
      num2 = inputNum[0] % inputNum[1];
      // console.log(`몫: ${num1}, 나머지: ${num2}`);
      console.log(` ${num1} ${num2}`);
    </script>
  </head>
  <body></body>
</html>
