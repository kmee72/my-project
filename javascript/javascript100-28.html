<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      <
         // 문제28 : 대문자만 지나가세요
            // 진구는 영어 학원 아르바이트를 하고 있습니다.
            // 반 아이들은 알파벳을 공부하는 학생들인데 오늘은 대문자 쓰기 시험을 봤습니다.
            // 알파벳 하나만을 입력하고 그 알파벳이 대문자이면 YES를
            // 아니면 NO를 출력하는 프로그램을 만들어 주세요.
            let char = prompt("알파벳 하나를 입력하세요.");
            let code = char.charCodeAt();
            if (code >= 60 && code <= 90) {
              console.log(true);
            } else {
              console.log(false);
            }
    </script>
  </head>
  <body></body>
</html>
