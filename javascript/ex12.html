<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 문제1
      let i = 20;
      // ++ 연산자만을 이용하여, i를 25로 만들어 출력하시오.
      i++;
      i++;
      i++;
      i++;
      i++;
      console.log(i);
      // 문제2
      // --연산자만을 이용하여, i를 19으로 만들어 출력하시오.
      i--;
      i--;
      i--;
      i--;
      i--;
      i--;
      console.log(i);
    </script>
  </head>
  <body></body>
</html>
