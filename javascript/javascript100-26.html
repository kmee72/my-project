<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let N = Number(prompt("1~100에서 정수 N을 입력하세요"));
      let sum = 0;
      for (let i = 1; i <= N; i++) {
        sum = sum + i
      }
      console.log(`1부터 ${N}까지의 총합은 ${sum}`);
    </script>
  </head>
  <body></body>
</html>
