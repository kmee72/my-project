<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex53.html -->
    <title>연습문제</title>
    <script>
      //1.  함수의 이름은 double이고,
      //매개변수로  number타입 1개를 받고,
      //그 값을 결과값으로 *2를 해서 반환하시오.
      //함수의 선언부ㅘ 호출부를 코딩하시오

      function double(Number) {
        let result = Number * 2;
        return result;
      }
      console.log(double(5));

      //2. 함수의 이름은 max이고,
      //   매개변수로 number타입 3개를 입력받고,
      //   그 3개 값중에 가장 큰 수를 반환하는 함수를 만드시오.
       function max(nums1, nums2, nums3) {
        if (Math.max === nums1) return nums1;
        if (Math.max === nums2) return nums2;
        if (Math.max === nums3) return nums3;
      }
      console.log(max(1,3,5));
      

      //3. 복불복 게임을 함수로 설계해 보자.
      //   입력 값으로 number타입(정수 1~10사이) 1개를 입력받고,
      //   그중 정수 3과 7일 때는 "게임에 졌습니다." 문자열을 반환하고,
      //   그외의 수(1,2,4,5,6,8,9,10)일때는 "게임에 이겼습니다"
      //   문자열을 반환하는 함수를 설계하시오.
      // 호출부에서 몇번 실행하여 테스트하시오.
      function game(num) {
        if (num === 3 || num === 7) return "게임에 졌습니다.";
        if (num !== 3 || num !== 7) return "게임에 이겼습니다";
      }
      console.log(game(1));
      console.log(game(7));
      console.log(game(8));
      console.log(game(9));
      console.log(game(3));
      console.log(game(3));
    </script>
  </head>
  <body></body>
</html>
