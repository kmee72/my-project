<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex58.html -->
    <title>this 연산자</title>
    <script>
      // this 예약어 : 객체가 자기 자신의 속성이나 메소드에 접근할 때 사요.
      // 주의: 일반함수(function)에서는 제대로 동작, 화살표함수에서는 상위 스코프(Scope)를 지정하기에 주의 요망.
      let globalVar = "전역 변수";
      let person = {
        name: "홍길동",
        localVar: "지역변수",
        regularFunc: function () {
          console.log(this.localVar);
          console.log(this.name); //동위레벨 변수참조 가능

          // 화살표 함수는 상위 스코프의 변수와  this접근 가능
          let arrowFunc = () => {
            console.log(this.localVar);
            console.log(this.name);
          };
          arrowFunc();
        },
      };
      person.regularFunc();


      let globalVar = "전역 변수";
      let person = {
        name: "홍길동",
        regularFunc: function () {
          let localVar: "지역변수",
          console.log(this.localVar);
          console.log(this.name); //동위레벨 변수참조 가능

          // 화살표 함수는 상위 스코프의 변수와  this접근 가능
          let arrowFunc = () => {
            console.log(this.localVar);
            console.log(this.name);
          };
          arrowFunc();
        },
      };
      person.regularFunc();
    </script>
  </head>
  <body></body>
</html>
