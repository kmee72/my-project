<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex45.html -->
    <title>문자열을 배열로 취급</title>
    <script>
      // 문자열도 내부적으로 배열의 구조를 가지고 있다.
      // *배열처럼 인덱스와 길이가 있다.
      let str = "hello";
      console.log(str);
      console.log(str[0]);
      console.log(str.length);
      // // 문자열 순회
      for (let i = 0; i < str.length; i++) {
        console.log(str[i]);
      }
      // // 문자(Character)가 여러개 모이면, 문자열(string)이다.
      // // 문자 인코딩표(유니코드표) - 글자를 숫자로 정리한 표이다.
      // // 유니코드 첫페이지는 아스키코드이다.(키보드자판문자 + 특수기호)
      // // 한글은 0xAC00부터 "가"...
      // // https://blog.naver.com/ouwukwfy/220248439711

      // // 문자(열)을 아스키코드값(숫자)로 바꾸기 :파이썬 ord("A")
      console.log("A".charCodeAt(0)); //65 0은 문자열의 인덱스
      console.log("ABC".charCodeAt(1)); //66
      console.log("Z".charCodeAt(0)); //90
      console.log("a".charCodeAt(0)); //97
      console.log("z".charCodeAt(0)); //122
      console.log("0".charCodeAt(0)); //48
      console.log("9".charCodeAt(0)); //57
      // // 숫자(아스키코드값)를 문자(열)로 바꾸기 : 파이썬 chr(65)
      console.log(String.fromCharCode(65)); //"A"

      //연습문제
      // 1. "G"라는 문자(열)가 대문자인지 여부를 true/false로 출력하시오.
      let char = prompt("문자를 입력하시오.");
      let code = char.charCodeAt(0);
      if (code >= 65 && code <= 90) {
        //문자열과 숫자 비교(x)
        console.log(true);
      } else {
        console.log(false);
      }
      //T
      // "A"~"Z"사이
      if (
        "A".charCodeAt(0) <= "G".charCodeAt(0) &&
        "G".charCodeAt(0) <= "Z".charCodeAt(0)
      ) {
        console.log(true);
      } else {
        console.log(false);
      }
      // 2. "hello"문자열을 "HELLO"로 바꾸시오.
      //T
      let hello = "hello";
      let HELLO = "";
      for (let i = 0; i < hello.length; i++) {
        String.fromCharCode(hello[i].charCodeAt(0) - 32);
        HELLO += String.fromCharCode(hello[i].charCodeAt(0) - 32);
      }
      console.log(HELLO);

      //3. "7" 문자(열)을 숫자 7로 바꾸시오. charCodeAt함수 사용.
      //T
      console.log("7".charCodeAt(0) - "0".charCodeAt(0));
      //글쓰기 - 초고 ->다듬기->윤문
      //중복된 코드 제거 -> 변수이름 알기쉽게 -> 로직 변경->함수로 분리

      //풀꽃
      //자세히 보아야
      //예쁘다
      //오래 보아야
      //사랑스럽다
      //너도 그렇다
      //(나태주 시인, 1945~)

      //문자열을 배열로 가져오기
      let arrStr = Array.from("hello");
      console.log(arrStr);

      //구분자로 문자열분리 후 배열로 만들어 준다.
      let arrStr2 = "apple, banana, orange".split(","); //쉼표로 분리
      console.log(arrStr2);
      let arrStr3 = "apple banana orange".split(" "); //공백으로 분리
      console.log(arrStr3);
      let arrStr4 = "apple".split(" ");
      console.log(arrStr4);
      //전개연산자...
      let arrStr5 = [..."apple"];
      console.log(arrStr5);

      let str3 = "apple";
      str3[0] = "C"; //읽기 전용이므로 안바뀜.
      console.log(str3);
      console.log(typeof str3); //string

      let arrStr1 = Array.from("hello");
      arrStr1[2] = "D";
      console.log(arrStr1);
      console.log(typeof arrStr1); //object

      //문제27 : 2-gram
      /*2-gram이란 문자열에서 2개의 연속된 요소를 출력하는 방법입니다.
       예를 들어 'Javascript'를 2-gram으로 반복해 본다면 다음과 같은 결과가 나옵니다.
       입력으로 문자열이 주어지면 2-gram으로 출력하는 프로그램을 작성해 주세요.

       입력
       Javascript
       출력
       J a
       a v
       v a
       a s
       s c
       c r
       r i
       i p
       p t        ​
       힌트: 문자열변수[0]은 첫번째 문자를 의미합니다.*/

      let str1 = "javascript";
      for (let i = 0; i < str1.length - 1; i++) {
        console.log(str1[i] + str1[i + 1]);
      }

      let str2 = "I love javascript";
      let words = str2.split(" ");
      for (let i = 0; i < words.length - 1; i++) {
        console.log(words[i] + " " + words[i + 1]);
      }

      let str3 = "javascript";
      for (let i = 0; i < str3.length - 1; i++) {
        console.log(str3[i] + " " + str3[i + 1]);
      }
    </script>
  </head>
  <body></body>
</html>
