<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex49.html -->
    <title>정렬알고리즘</title>
    <script>
      //정렬알고리즘
      // 대표적인 정렬 알고리즘 : 버블정렬, 선택정렬, 삽입정렬
      // https://velog.io/@minji0801/%EB%B2%84%EB%B8%94%EC%A0%95%EB%A0%AC-vs-%EC%84%A0%ED%83%9D%EC%A0%95%EB%A0%AC-vs-%EC%82%BD%EC%9E%85%EC%A0%95%EB%A0%AC-%EC%B0%A8%EC%9D%B4-%EC%A0%9C%EB%8C%80%EB%A1%9C-%EC%95%8C%EA%B3%A0%EA%B0%80%EC%9E%90

      // 치환(변수 교환하기)
      let a = 10;
      let b = 20;
      // 값을 교환하려면, 임시변수를 하나 사용한다.
      let temp = a;
      a = b;
      b = temp;
      console.log(b);

      // 1. 버블정렬(bubble sort)
      let numbers = [9, 8, 1, 3, 2];
      //모든 요소를 쌍으로 비교한다.
      //0:1 0:2 0:3 0:4 비교
      //1:2 1:3 1:4 비교
      //2:3 2:4 비교
      //3:4 비교
      //이중 반복문으로 i,j인덱스 발생
      for (let i = 0; i < numbers.length - 1; i++) {
        console.log("i", i);
        for (let j = i + 1; j < numbers.length - 1; j++) console.log("j", j);
      }

      //버블 정렬 - 오름차순
      //모든 자릿수를 쌍으로 비교하여, 왼쪽 값이 더 크면,
      //치환한다.
      for (let i = 0; i < numbers.length - 1; i++) {
        for (let j = 0; j < numbers.length - 1 - i; j++) {
          console.log("비교 쌍:", j, j + 1);
          if (numbers[j] > numbers[j + 1]) {
            //치환
            t = numbers[j];
            numbers[j] = numbers[j + 1];
            numbers[j + 1] = t;
          }
        }
      }
      console.log(numbers);
    </script>
  </head>
  <body></body>
</html>
