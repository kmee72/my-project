<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex15.html -->
    <title>Document</title>
    <script>
      // 문제1
      // 사용자로부터 1~100 중의 숫자중에서  2개의 정수를 입력받고,
      // 사칙연산과 나머지 연산을 수행하시오.
      // 단 , 첫번째수는 두번째 수보다 클것.
      let num1 = prompt("첫번째 숫자");
      num1 = Number(num1);
      console.log(num1); //11
      let num2 = prompt("두번째 숫자");
      num2 = Number(num2); //3
      console.log(num1 + num2); //14
      console.log(num1 - num2);//
      console.log(num1 * num2);
      console.log(parseInt(num1 / num2));
      console.log(parseInt(num1 % num2));
      // + - * / %
      // 몫에 대해서는 정수값으로 출력하시오.
    </script>
  </head>
  <body></body>
</html>
