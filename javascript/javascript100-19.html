<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //  문제19 : 몇 번째 행성인가요? if문
      // 우리 태양계를 이루고 있는 행성은 수성, 금성, 지구, 화성, 목성, 토성, 천왕성, 해왕성으로 총 8개 입니다.
      // 저희는 우리 태양계의 n번째 행성이 무엇인지 알고 싶습니다.
      //입력으로 행성의 순서를 나타내는 숫자 n이 입력됩니다.
      //출력으로 그 순서에 해당하는 행성의 이름을 출력해 주세요.
      //예를 들어 1이 입력되면, 첫번째 행성인 수성이 출력됩니다.
      //입출력
      // 입력 : 1
      // 출력 : 수성

      const n = prompt("1부터 8사이의 정수 하나를 입렵해 주세요");
      const num = Number(n);
      if ((num = 1)) {
        console.log(수성);
      } else if ((n = 2)) {
        console.log(금성);
      } else if ((n = 3)) {
        console.log(지구);
      } else if ((n = 4)) {
        console.log(화성);
      } else if ((n = 5)) {
        console.log(목성);
      } else if ((n = 6)) {
        console.log(토성);
      } else if ((n = 7)) {
        console.log(천왕성);
      } else if ((n = 8)) {
        console.log(명왕성);
      }
    </script>
  </head>
  <body></body>
</html>
