<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let num = prompt("숫자를 입력하세요");
      num = Number(num);
      num1 = Math.floor(num/ 100);
      num2 = Math.floor((num%100) / 10);
      num3 = num%10;
      console.log("백의자릿수" + num1);
      console.log("십의자릿수" + num2);
      console.log("일의자릿수" + num3);

      
    </script>
  </head>
  <body></body>
</html>
