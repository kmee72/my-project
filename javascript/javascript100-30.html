<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    // 문제30 : 구구단 출력하기
      // 1~9까지의 숫자 중 하나를 입력하면
      // 그 단의 구구단 결과를 한 줄에 출력하는 프로그램을 작성하세요.
      let num = parseInt(prompt("숫자를 입력하시오"));
      let result = " ";
      for (let i = 1; i <= 9; i++) {
        result += num * i + " ";
      }
      console.log(`${num}단${result}`);
  </script>
</head>

</html>
