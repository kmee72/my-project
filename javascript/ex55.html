<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex55.html -->
    <title>타이머 함수, 인터벌 함수</title>
    <script>
      //타이머 함수, 인터벌 함수
      // setTimeout함수 :  일정시간 후에 코드 호출
      // setInterval함수 :  일정 시간마다(주기적)코드 호출
      setTimeout(() => {
        console.log("3초 타이머.");
      }, 3000); //함수 지연시간 3000ms

      let id = setInterval(() => {
        console.log("1초마다 수행됨");
        // console.log(new Date());
        //2025-01-13 16:45:20
        let time = new Date().toTimeString().split(" ")[0];
        let date = new Date().toISOString().split("T")[0];
        console.log(date + " " + time);
      }, 1000);
      clearInterval(id);
    </script>
  </head>
  <body></body>
</html>
