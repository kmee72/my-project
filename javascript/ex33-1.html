  <!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>랜덤 숫자와 최대값</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .numbers { margin-bottom: 10px; }
    .max { font-weight: bold; color: red; }
    button { padding: 10px 15px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>랜덤 숫자와 최대값 확인</h1>
  <div class="numbers">생성된 숫자: <span id="nums"></span></div>
  <div class="max">최대값: <span id="maxValue">0</span></div>
  <button id="generateBtn">숫자 생성</button>

  <script>
    const numsEl = document.getElementById("nums");
    const maxEl = document.getElementById("maxValue");
    const btn = document.getElementById("generateBtn");

    btn.addEventListener("click", () => {
      let numbers = [];
      let max = 0;

      // 10개의 랜덤 숫자 생성
      for (let i = 0; i < 10; i++) {
        let num = Math.floor(Math.random() * 100) + 1; // 1~100
        numbers.push(num);

        // 최대값 갱신
        if (num > max) {
          max = num;
        }
      }

      // 화면에 출력
      numsEl.textContent = numbers.join(", ");
      maxEl.textContent = max;
    });
  </script>

</body>
</html>

</body>
