<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex25.html -->
    <title>Document</title>
    <script>
      //조건문 - switch case문
      //형식
      //switch(변수){
      //    case 값1:
      //       변수 === 값1 같을 때 수행하는 수행문;
      //       break;
      //    case 값2:
      //       변수 === 값2 같을 때 수행하는 수행문;
      //       break;
      //    default:
      //       그 외의 수행하는 수행문;
      //       break;
      //break문 : switch문을 종료하고 끝으로 나간다.
      //          반복문의 종료에도 사용한다.

      // *순서 : 먼저 변수와값을 비교 같으면 변수 수행후 break gn 끝으로 프로세스가 끝을감
      // 맞지 않으면 값2의 변수 수행 후 break걸리고 끝으로 감

      // switch, case는 예약어, 변수는 number, string, boolean 타입 가능 { block scope}
      //  변수는 number, string, boolean 타입 가능
      // { } : block 또는 scope

      //  ===과 ===의 차이점
      let num = 10;
      let str = "10";
      if (num == str) {
        console.log("값이 같음");
      }
      if (num === str) {
        console.log("값과 타입이 같음");
      }
      //데이터 타입을 정적 타입으로 설정하는 Super Set(아래까지 모두 감쌈)언어가 타입스크립트이다.
      // 타입스크립트는 Super Set : 바닐라자바스크립트까지 모두 감싸고 다른 기능까지 사용
      // 타입스크립트가 인기 1등!! 파이썬, JS, JAVA, C/C++
      // react일경우 타입스크립트사용

      let myNum = 30;
      switch (myNum) {
        case 10:
          console.log("10입니다.");
          break;
        case 20:
          console.log("20입니다.");
          break;
        default:
          console.log("그외의 수입니다.");
          break;
      }
      if (myNum === 10) {
        console.log("10입니다.");
      } else if (myNum === 20) {
        console.log("20입니다.");
      } else {
        // default와 같음
        console.log("그외의 수입니다.");
      }

      //문자열 변수도 가능
      let season = "가을";
      switch (season) {
        case "봄":
          console.log("봄입니다.");
          break;
        case "여름":
          console.log("여름입니다.");
          break;
        case "가을":
          console.log("가을입니다.");
          break;
        case "겨울":
          console.log("겨울입니다.");
          break;
        default:
          console.log("그 외의 봄입니다.");
          break;
      }
    </script>
  </head>
  <body></body>
</html>
