<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex19.html -->
    <title>대입연산자</title>
    <script>
      function myFunc() {
        return 20;
      }

      // 대입연산자 : = 오른쪽 항의 값을 왼쪽 항으로 덮어쓰기한다.
      // 복합대입연산자 : +=  -+  *=  /=  %=
      let num1 = 10;
      let num2 = num1;
      let num3 = myFunc(); //함수의 반환값도 대입됨
      console.log(num1, num2, num3);

      //prettier-ignore
      let num4 = num5 = num6 = 30; //대입연산자이기에 30이 num6로 먼저 연산 그다음 num5, num4
      console.log(num4, num5, num6);

      // 복합대입연산자
      let num10 = 10;
      num10 += 2; //num10 = num10 + 2
      num10 -= 2; //num10 = num10 - 2
      num10 *= 2; //num10 = num10 * 2
      num10 /= 2; //num10 = num10 / 2
      num10 %= 2; //num10 = num10 % 2
      num10 **= 2; //num10 = num10 * 2 //거듭제곱
      // 10^2= 10*10 =10의 2승 = 100

      // +1증가
      num10++;
      num10 += 1;
      num10 = num10 + 1;
    </script>
  </head>
  <body></body>
</html>
