<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex52.html -->
    <title>함수 Function</title>
    <script>
      //  함수 Function
      //    : 기능 단위로 분리해 놓은 코드 뭉치
      //    : 코드에 이름을 붙여 놓고 호출(실행), 전달(함수형변수, 익명함수)할 수 있다.
      // 사용하는 이유
      // 1. 중복된 코드를 제거 할 수 있다.(반복문, 함수, 클래스)
      // 2. 코드뭉치에 이름을 붙여서 가독성 올릴 수 있다.(기존-코멘트보다는 낫다.)

      // 함수의 4가지 형식
      // 1. 매개변수(입력값) x, 반환값 x
      // 2. 매개변수(입력값) o, 반환값 x
      // 3. 매개변수(입력값) x, 반환값 o
      // 4. 매개변수(입력값) o, 반환값 o

      // 함수의 종류
      // 1. return문
      // 2. { } 블럭의 마지막에서 종료
      // break문 -> 반복문, switch문의 종료

      // 1. 매개변수(입력값) x, 반환값 x
      // 선언부 - 선언만 하고 실행되지 않음.
      // 호출부 - 위에서 선언되어 있지 않으면 실행 안됨.
      function myFunc1() {
        console.log("myFunc1()");
        return; //생략가능
      }
      myFunc1();

      // 2. 매개변수(입력값) o, 반환값 x
      function myFunc2(param) {
        //NonExcutable code : 설계사무소
        console.log("파라미터:", param);
      }
      myFunc2(10); //Excutable Code : 시공사

      // 3. 매개변수(입력값) x, 반환값 o
      function myfunc3() {
        return "홍길동";
      }
      // 함수반환값을 받으려면 대입연산자 이용
      let name = myFunc3();
      console.log(name);

      // 4. 매개변수(입력값) o, 반환값 o

      function muyFunc4(param1, param2) {
        //입력값 두개를 더한 값을 Output(결과값)으로 반환
        return param1 + param2;
      }
      console.log(myFunc4(10, 20));
      
    </script>
  </head>
  <body></body>
</html>
