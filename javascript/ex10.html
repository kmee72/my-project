<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex10.html -->
    <title>Document</title>
    <script>
      //1.  prompt함수를 이용하여 사용자로부터 아라비아숫자를 입력받는다.
      // 입력받은 문자열을 number타입으로 변화하고,
      //  2를 곱한 결과를 출력하시오.
      //2. 문제 1에서 입력받은 숫자를 3으로 나눈 수를 출력하시오.
      //
      let num1 = prompt("숫자를 입력하세요");
      let str1 = Number(num1);
      let cross = str1 * 2;
      console.log(str1);
      console.log(cross);
      console.log(str1 / 3);
      console.log(cross / 3);
    </script>
  </head>
  <body></body>
</html>
