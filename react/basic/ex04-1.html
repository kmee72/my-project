<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ex04.html -->
    <title>JSX를 이용한 html요소 생성하기</title>
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <!-- JSX문법을 JS로 변환해주는 바벨(Babel.js) -->
    <!-- min.js : 소스용량을 줄이기 위해 공백, 줄바꿈을 제거한 js  -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <title>HTML only</title>
      </head>
      <body>
        <p>순수 HTML이용하여 작성</p>
        <div id="root">
          <h1 class="greeting">Hello World~</h1>
        </div>
      </body>
    </html>

</html>
