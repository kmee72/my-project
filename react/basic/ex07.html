<!doctype html>
<html lang="en">
  <head>
    <!-- 리액트 훅(Hook)  -->
    <!--훅 : 꼬챙이, SW에서는 끼여들어가서 수행하는 기능 -->
    <!-- 훅 함수의 종류 : useState, useEffect, useContext, useReducer, ... -->
    <title>컴퍼넌트 상태값 관리하기(useState 훅(Hook) 이용)</title>
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <p>컴퍼넌트 상태값 관리하기(useState 훅(Hook) 이용)</p>

    <div id="root"></div>

    <!-- <button onclick="setISClicked(true)">Click here!</button>
    <script>
      let buttons = document.getElementsByTagName("button");
      buttons[0].onclick = function () {
        this.innerText = "Clicked!";
      };
    </script> -->
    

    <script type="text/babel">
      function MyButton() {
        // 구조분해할당 :  [state상태값, 상태변경함수]를 반환함.
        // isClicked = false 기본값 초기화 되므로, boolean타입니다.
        const [isClicked, setIsClicked] = React.useState(false);

        // React.createElement(type, props, children)
        // type :  생성할 React 엘리먼트의 타입
        // props : 해당 엘리먼트에 전달할 속성(props)
        // children : 자식요소 특 태그 사이에 들어갈 내용
        return React.createElement(
          "button",
          {
            onClick: () => setIsClicked(true),
          },
          isClicked ? "Clicked!" : "ClickHere!",
        );
      } // NyButton
      const root = ReactDOM.createRoot(document.getElementById("root"));
      //JSX컴퍼넌트 형태로 호출해야 됨.
      root.render( <MyButton/>);
    </script>




    <script type="text/babel">
      function MyButton() {
        const [isClicked, setIsClicked] = React.useState(false);
        return React.createElement(
          "button",
          {
            onClick: () => setIsClicked((prev) => !prev),
          },
          isClicked ? "clicked" : "Click here!",
        );
      } // NyButton
      const root = ReactDOM.createRoot(document.getElementById("root"));
      //MyButton 함수안에서 리액트 훅을 사용하면, JSX컴퍼넌트 형태로 호출해야 됨.
      root.render(<MyButton />);
    </script>
  </body>
</html>
