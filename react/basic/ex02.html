<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ex02.html -->
  <title>순수 JS로 HTML요소 생성하기 </title>
</head>
<body>
  <p>순수 JS로 HTML요소 생성하기</p>
  <div id="root"></div>
  <script>
    //<h1 class="greeting">Hello World!</h1>
    const h1 = document.createElement("h1"); // createElement에의해html모든 객체가 나옴
    h1.calssName = "greeging";
    h1.textContent = "Hello World";
    h1.style.color = "red";
    
    document.getElementById("root").appendChild(h1);
  </script>
</body>
</html>
