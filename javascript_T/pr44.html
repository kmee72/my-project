<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      /*입출력(출처: 제주코딩캠프)
      1위 ~ 3위 학생은 여러명일 수 있고 1~3위 학생 중 중복되는 학생까지 포함하여 사탕을 사기로 한다.
      학생들의 점수를 공백으로 구분하여 입력을 받고 사탕을 받을 학생의 수를 출력하세요.
      입력 : 97 86 75 66 55 97 85 97 97 95
      출력 : 6*/
      // 답안 or (구글)GPT = >내 솔루션으로 체화 가능?
      // 나만의 솔루션으로 가능?

      let score = "97 86 75 66 55 97 85 97 97 95";
      let arr = new Array(101);
      for (let i = 0; i < 100; i++) {
        arr[i] = 0;
      }
      console.log(arr);

      score
        .split(" ")
        .map(Number)
        .forEach((item) => {
          arr[item] += 1; //97 86과 같은 데이터를 배열의 인덱스로 사용하고,카운트를 센다.
        });
      console.log(arr);
      let count_candy = 0; //사탕을 줄 사람의 수
      let countdown = 3; //3등까지만 센다.
      for (let i = arr.length - 1; i >= 0; i--) {
        if (arr[i] > 0) {
          count_candy += arr[i]; //arr[97] = 4
          countdown--;
        }
        if (countdown == 0) {
          //3등까지 다 셌다.
          break;
        }
      }
      console.log("사탕 줄 사람 수", count_candy);
    </script>
  </head>
  <body></body>
</html>
